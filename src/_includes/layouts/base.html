<!-- A fully fleshed-out <head>, dynamically changing based on client.json and the page front matter -->

<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Standard meta tags -->
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="{{ description }}">
        <link rel="canonical" href="{{ client.domain }}{{ page.url }}">
        <meta name="generator" content="{{ eleventy.generator }}">

        <!--Social Media Display-->
        <meta property="og:title" content="{{ title }}"/>
        <meta property="og:description" content="{{ description }}"/>
        <meta property="og:type" content="website"/>
        <meta property="og:url" content="{{ client.domain }}{{ page.url }}"/>

        <!-- Add Meta Image Before Deployment -->
        <meta property="og:image" content="{{ image or "/assets/favicons/web-app-manifest-512x512.png" }}"/>
        <meta property="og:image:secure_url" content="{{ image or "/assets/favicons/web-app-manifest-512x512.png" }}"/>

        <!--Favicons-->
        <link rel="icon" type="image/png" href="/assets/favicons/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg" />
        <link rel="shortcut icon" href="/assets/favicons/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Noblessa" />
        <link rel="manifest" href="/assets/favicons/site.webmanifest" />

        <!-- Preloads -->
        <!-- <link rel="preload" as="image" href="/assets/svgs/logo-black.svg"> -->
        <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/Simplifica/SIMPLIFICA-Typeface.woff2" crossorigin>
        <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/Open Sans/open-sans-v43-latin_symbols-regular.woff2" crossorigin>
        <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/Open Sans/open-sans-v43-latin_symbols-600.woff2" crossorigin>

        <!-- Preload and immediately apply root CSS to avoid chaining -->
        <link rel="preload" href="/assets/css/root.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
        <noscript><link rel="stylesheet" href="/assets/css/root.css"></noscript>
        
        <!-- Sitewide Scripts -->
        <script defer src="/assets/js/nav.js"></script>
        <script defer src="/assets/js/scroll-animations.js"></script>
        <script defer src="/assets/js/auth.js"></script>
        <script defer src="/assets/js/lazy-loading.js"></script>
        <script defer src="/assets/js/cookie-consent.js"></script>
        <script defer src="/assets/js/cookie-utils.js"></script>

        <!-- Meta Pixel Code -->
        <script>
            !function(f,b,e,v,n,t,s)
            {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
            n.callMethod.apply(n,arguments):n.queue.push(arguments)};
            if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
            n.queue=[];t=b.createElement(e);t.async=!0;
            t.src=v;s=b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t,s)}(window,document,'script',
            'https://connect.facebook.net/en_US/fbevents.js');
            fbq('init', '1374621112917134'); 
            fbq('track', 'PageView');
        </script>
        <noscript>
            <img height="1" width="1" 
            src="https://www.facebook.com/tr?id=1374621112917134&ev=PageView
            &noscript=1"/>
        </noscript>
        <!-- End Meta Pixel Code -->

        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-29MGD5D9V5"></script>
        <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-29MGD5D9V5');
        </script>
        
        {% block head %}{% endblock %}

        <title>{{ title }}</title>
    </head>
    <body>
        <!--Screen reader skip main nav-->
        <a class="skip" aria-label="skip to main content" href="#main">Click To Skip To Main Content</a>

        {% include "sections/header.html" %}
        <main id="main">
            {% block body %}{% endblock %}
        </main>
        {% include "sections/footer.html" %}

    </body>
</html>

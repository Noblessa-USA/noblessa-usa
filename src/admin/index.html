<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <title>noblessa USA Content Manager</title>
</head>

<body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- Decap CMS preview pane script -->
    <!-- Edit this script to customize the preview pane for your blog posts.  -->
    <!-- Documentation: https://decapcms.org/docs/customization/ -->
    <script type="text/babel">
        const BlogPreview = createClass({
            render: function () {
                // Get all the props from the collection
                const data = this.props.entry.get("data").toJS();
                const { title, date: rawDate, image, tags } = data;
                const date = typeof rawDate === "string" ? new Date(rawDate) : rawDate;
                let formattedDate = "";
                if (date) {
                    formattedDate = Intl.DateTimeFormat("en-US", {
                        month: "long",
                        day: "numeric",
                        year: "numeric"
                    }).format(date);
                }

                const cover = this.props.getAsset(image);

                // Filter tags to match production logic
                const displayTags = tags?.filter(tag => 
                    tag !== "post" && tag !== "posts" && tag !== "sitemap" && tag !== "featured"
                ) || [];

                // Create elements matching the production blog post template using h() function
                return h('div', {id: 'single-article'},
                    h('div', {className: 'cs-container'},
                        h('article', {className: 'cs-article-post'},
                            h('div', {className: 'cs-article-meta'},
                                h('div', {className: 'cs-article-date'},
                                    h('svg', {className: 'cs-calendar-icon', width: '16', height: '16', viewBox: '0 0 16 16', fill: 'none', xmlns: 'http://www.w3.org/2000/svg'},
                                        h('rect', {x: '2', y: '3', width: '12', height: '11', rx: '2', stroke: 'currentColor', strokeWidth: '1.5'}),
                                        h('path', {d: 'M2 6H14', stroke: 'currentColor', strokeWidth: '1.5'}),
                                        h('path', {d: 'M5 1V4', stroke: 'currentColor', strokeWidth: '1.5', strokeLinecap: 'round'}),
                                        h('path', {d: 'M11 1V4', stroke: 'currentColor', strokeWidth: '1.5', strokeLinecap: 'round'})
                                    ),
                                    h('span', {className: 'cs-date'}, formattedDate)
                                ),
                                displayTags.length > 0 ? h('span', {className: 'cs-dot'}) : null,
                                displayTags.length > 0 ? h('div', {className: 'cs-tags'},
                                    displayTags.map(function(tag, index) {
                                        return h('span', {key: index, className: 'cs-tag'}, tag);
                                    })
                                ) : null
                            ),
                            h('section', {className: 'cs-article-content'},
                                this.props.widgetFor('body')
                            )
                        )
                    )
                );
            }
        });

        // Register the elements and styles for the "blog" collection
        CMS.registerPreviewTemplate("blog", BlogPreview);
        
        // Register the preview stylesheet that includes all necessary blog styles
        CMS.registerPreviewStyle("/admin/decap-preview-styles.css");
    </script>
</body>

</html>

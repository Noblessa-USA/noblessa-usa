# Use DecapBridge classic auth (required)
backend:
  name: git-gateway
  repo: Noblessa-USA/noblessa-usa
  branch: production
  identity_url: https://auth.decapbridge.com/sites/8b07dcda-d902-4e31-af24-ea17e7ce2de2
  gateway_url: https://gateway.decapbridge.com

  # See who did what (optional)
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Callowhill Web Designs Logo
logo:
  src: https://callowhillwebdesigns.com/assets/images/logoforemail.png
  show_in_header: true

# Display URL in top bar of Decap CMS
display_url: https://noblessa-usa.com

# Add site links in Decap CMS
site_url: https://noblessa-usa.com

# Keep this to allow you to edit the cms locally
local_backend: true

# Image folders
media_folder: "src/assets/images/blog"
public_folder: "/assets/images/blog"

# Decap CMS Collections
collections:
    - name: "blog"
      label: "Blog"
      folder: "src/content/blog"
      create: true
      slug: "{{slug}}"
      fields:
          - { label: "Title", name: "title", widget: "string" }
          - {
                label: "URL Slug",
                name: "url",
                widget: "string",
                hint: 'Specify where the page will be written to. If you use "Blog Post", the post will be accessible from "blog/blog-post"',
            }
          - { label: "Description", name: "description", widget: "string", hint: 'Provide a brief summary of the blog post for SEO and preview purposes. This will be used as the Meta Description for SEO.' }
          - { label: "Author", name: "author", widget: "string", hint: 'This is only viewable internally. End users cannot see blog post authors.' }
          - { label: "Date", name: "date", widget: "datetime", hint: 'The date this article is published. If the date is set sometime in the future, the blog post will not appear on the site until that time and date. Make sure this is set to a time in the past to have it appear on the main blog page.' }
          - { label: "Tags", name: "tags", widget: "list", default: ["post"], hint: 'Add the "post" tag to have this article appear on the main blog page. Tags can be, "Design Tips", "Kitchens", "Bathrooms", "Living Rooms", "Trends", "News", "Partners", "Info", and "Remodel"' }
          - { label: "Featured Image", name: "image", widget: "image", hint: 'This image will be used as the cover image for the blog post. Recommended Minimum dimensions: 1200x630 pixels.' }
          - { label: "Image Caption", name: "imageAlt", widget: "string", hint: 'Provide a descriptive caption for the featured image for SEO & accessibility purposes.' }
          - { label: "Body", name: "body", widget: "markdown" }
